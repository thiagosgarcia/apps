<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!-- Background: green-ish -->
  <rect x="0" y="0" width="1024" height="1024" rx="220" fill="#3DDC84"/>

  <!-- Simple cartoon king piece (black + gray), low detail -->
  <g transform="translate(512 560)">
    <!-- Shadow -->
    <ellipse cx="18" cy="350" rx="260" ry="52" fill="#000000" opacity="0.18"/>

    <!-- Base plate -->
    <path d="M-280 330 C-200 260, 200 260, 280 330 L240 410 C180 450, -180 450, -240 410 Z"
          fill="#2B2B2B" opacity="0.95"/>
    <path d="M-230 372 C-150 330, 150 330, 230 372 L205 410 C150 435, -150 435, -205 410 Z"
          fill="#5C5C5C" opacity="0.85"/>

    <!-- Body (tapered) -->
    <path d="M-190 275 C-170 120, -120 10, -40 -60
             C-20 -80, -4 -115, -10 -150
             C-18 -195, -75 -230, -100 -260
             C-135 -305, -85 -350, 0 -350
             C85 -350, 135 -305, 100 -260
             C75 -230, 18 -195, 10 -150
             C4 -115, 20 -80, 40 -60
             C120 10, 170 120, 190 275
             C150 300, 90 315, 0 315
             C-90 315, -150 300, -190 275 Z"
          fill="#1F1F1F"/>

    <!-- Simple highlight -->
    <path d="M-95 250 C-105 160, -70 75, -18 18
             C-45 -25, -55 -70, -45 -110
             C-38 -140, -15 -165, 0 -175
             C-70 -160, -105 -130, -110 -95
             C-120 -20, -95 75, -70 165
             C-60 205, -75 235, -95 250 Z"
          fill="#7A7A7A" opacity="0.35"/>

    <!-- Crown top -->
    <path d="M-140 -250 C-100 -300, -55 -325, 0 -325
             C55 -325, 100 -300, 140 -250
             C95 -260, 60 -250, 20 -230
             C10 -220, -10 -220, -20 -230
             C-60 -250, -95 -260, -140 -250 Z"
          fill="#2A2A2A"/>

    <!-- Cross (cartoon) -->
    <g transform="translate(0 -390)">
      <rect x="-22" y="0" width="44" height="140" rx="20" fill="#1A1A1A"/>
      <rect x="-80" y="40" width="160" height="44" rx="20" fill="#1A1A1A"/>
      <rect x="-18" y="10" width="36" height="120" rx="18" fill="#8A8A8A" opacity="0.25"/>
    </g>

    <!-- Outline for icon readability -->
    <path d="M-280 330 C-200 260, 200 260, 280 330"
          fill="none" stroke="#000000" stroke-opacity="0.35" stroke-width="18" stroke-linecap="round"/>
    <path d="M-190 275 C-170 120, -120 10, -40 -60
             C-20 -80, -4 -115, -10 -150
             C-18 -195, -75 -230, -100 -260
             C-135 -305, -85 -350, 0 -350
             C85 -350, 135 -305, 100 -260
             C75 -230, 18 -195, 10 -150
             C4 -115, 20 -80, 40 -60
             C120 10, 170 120, 190 275"
          fill="none" stroke="#000000" stroke-opacity="0.28" stroke-width="16" stroke-linecap="round"/>
  </g>
</svg>
